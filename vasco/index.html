<!doctype html>
<html lang="sl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tu-Val | Vasco izvoz naročil</title>
    <link rel="stylesheet" href="vasco.css?v=3">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <span class="eyebrow">Vasco API</span>
          <h1>Naročila kupca</h1>
        </div>
        <div class="status-pill" data-status>Pripravljen</div>
      </header>

      <section class="workspace" aria-label="Vasco izvoz naročil">
        <form class="filter-panel" data-form>
          <div class="mode-row" data-source-mode>
            <label class="mode-option">
              <input name="sourceMode" type="radio" value="api" checked>
              <span>API</span>
            </label>
            <label class="mode-option">
              <input name="sourceMode" type="radio" value="json">
              <span>Swagger JSON</span>
            </label>
          </div>

          <div data-api-fields>
            <div class="form-grid">
              <label>
                <span>Partner</span>
                <input name="partner" inputmode="numeric" autocomplete="off" placeholder="501">
              </label>

              <label>
                <span>Številka.leto</span>
                <input name="stevilkaLeto" autocomplete="off" placeholder="00002.2024">
              </label>

              <label>
                <span>Datum od</span>
                <input name="datumOd" type="date">
              </label>

              <label>
                <span>Datum do</span>
                <input name="datumDo" type="date">
              </label>

              <label>
                <span>Artikel</span>
                <input name="artikel" autocomplete="off" placeholder="šifra">
              </label>

              <label>
                <span>Block size</span>
                <input name="blockSize" type="number" min="1" step="1" value="10000">
              </label>

              <label>
                <span>Block index</span>
                <input name="blockIndex" type="number" min="0" step="1" value="0">
              </label>

              <label class="wide">
                <span>Bearer token</span>
                <input name="token" type="password" autocomplete="off" placeholder="pusti prazno, če je nastavljen na strežniku">
              </label>
            </div>

            <div class="options-row">
              <label class="check">
                <input name="vrniPostavke" type="checkbox" checked>
                <span>Vrni postavke</span>
              </label>
              <label class="check">
                <input name="vrniOznakoPriloge" type="checkbox">
                <span>Vrni oznake prilog</span>
              </label>
            </div>
          </div>

          <div class="manual-fields" data-manual-fields hidden>
            <label>
              <span>JSON datoteka</span>
              <input name="jsonFile" type="file" accept=".json,application/json">
            </label>

            <label>
              <span>Swagger odgovor</span>
              <textarea name="jsonText" rows="12" spellcheck="false" placeholder='[{"stevilka":"00002","leto":2024,"partner":501,"postavke":[]}]'></textarea>
            </label>
          </div>

          <div class="actions">
            <button class="primary" type="submit">Prikaži</button>
            <button type="button" data-export>Excel</button>
            <button type="button" data-clear>Počisti</button>
          </div>

          <div class="download-panel" data-download-panel hidden>
            <a class="download-link" href="#" download data-download-link>Prenesi Excel</a>
          </div>
        </form>

        <section class="results-panel" aria-label="Rezultati">
          <div class="metrics">
            <div>
              <strong data-order-count>0</strong>
              <span>Naročil</span>
            </div>
            <div>
              <strong data-item-count>0</strong>
              <span>Postavk</span>
            </div>
            <div>
              <strong data-total>0,00</strong>
              <span>Znesek z DDV</span>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Številka</th>
                  <th>Leto</th>
                  <th>Datum</th>
                  <th>Partner</th>
                  <th>Šifra</th>
                  <th>Naziv artikla</th>
                  <th>Količina</th>
                  <th>Cena</th>
                  <th>Komercialist</th>
                  <th>Znesek</th>
                  <th>Znesek z DDV</th>
                  <th>Postavke</th>
                </tr>
              </thead>
              <tbody data-table-body>
                <tr>
                  <td colspan="12" class="empty">Ni prikazanih podatkov.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="vasco.js?v=3"></script>
  </body>
</html>
